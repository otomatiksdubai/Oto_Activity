<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Staff Management</title>
    <link rel="stylesheet" href="assets/style.css" />
</head>

<body onload="renderStaff()">
    <div class="container">
        <div class="topbar">
            <div class="brand">
                <img src="assets/Otomatiks logo.png" alt="Otomatiks Logo" class="logo-img">
                <div class="small" id="who" style="margin-left:auto"></div>
            </div>
            <div class="actions">
                <button class="btn ghost" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="layout">
            <aside class="sidebar">
                <div class="badge">MENU</div>
                <div class="nav" id="nav" style="margin-top:10px"></div>
            </aside>

            <main class="card">
                <h1>Staff Management</h1>
                <p class="muted">Add and manage trainers and staff members (Admin only)</p>

                <div id="staffForm">
                    <h2>Add New Staff Member</h2>
                    <div class="row3">
                        <div class="field"><label>Full Name</label><input id="staffName" placeholder="Enter full name">
                        </div>
                        <div class="field"><label>Email / Username</label><input id="staffEmail"
                                placeholder="Email address"></div>
                        <div class="field"><label>Password</label><input id="staffPassword" type="password"
                                placeholder="Password"></div>
                    </div>
                    <div class="row3">
                        <div class="field"><label>Role</label>
                            <select id="staffRole">
                                <option value="trainer">Trainer</option>
                                <option value="staff">Staff</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="field"><label>Phone</label><input id="staffPhone" placeholder="Phone number"></div>
                        <div class="field"><label>Specialization (Optional)</label><input id="staffSpecialization"
                                placeholder="e.g., Robotics, Arduino"></div>
                    </div>
                    <div class="actions" style="margin-top:10px">
                        <button class="btn ok" onclick="addStaff()">Add Staff Member</button>
                    </div>
                    <div id="staffMsg" style="margin-top:10px"></div>
                    <hr>
                </div>

                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <h2 style="margin:0;">Staff Members List</h2>
                    <button id="lockBtn" class="btn ghost" onclick="toggleDeleteLock()">🔒 Locked (Click to Unlock
                        Delete)</button>
                </div>

                <div class="scroll-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Phone</th>
                                <th>Specialization</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staffTable"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- View/Edit Staff Modal -->
    <div id="staffModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:600px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h2 style="margin:0;">Staff Details</h2>
                <button class="btn ghost" onclick="closeStaffModal()" style="padding:6px 12px;">✕</button>
            </div>

            <div class="row">
                <div class="field"><label>Full Name</label><input id="viewStaffName" readonly
                        style="background:#f8f9fa;"></div>
            </div>
            <div class="row">
                <div class="field"><label>Email / Username</label><input id="viewStaffEmail" readonly
                        style="background:#f8f9fa;"></div>
            </div>
            <div class="row">
                <div class="field"><label>Role</label><input id="viewStaffRole" readonly style="background:#f8f9fa;">
                </div>
            </div>
            <div class="row">
                <div class="field"><label>Phone</label><input id="viewStaffPhone" readonly style="background:#f8f9fa;">
                </div>
            </div>
            <div class="row">
                <div class="field"><label>Specialization</label><input id="viewStaffSpecialization" readonly
                        style="background:#f8f9fa;"></div>
            </div>

            <div class="actions" style="margin-top:20px;">
                <button class="btn ok" id="editStaffBtn" onclick="enableStaffEdit()" style="display:none;">Edit</button>
                <button class="btn ok" id="saveStaffBtn" onclick="saveStaff()" style="display:none;">Save
                    Changes</button>
                <button class="btn ghost" onclick="closeStaffModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="assets/data.js"></script>
    <script src="assets/app.js"></script>
</body>

</html>
