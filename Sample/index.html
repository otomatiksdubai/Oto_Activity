<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Institute Portal - Login</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>
  <div class="container" style="max-width:500px">
    <div class="topbar">
      <div class="brand">
        <img src="assets/Otomatiks logo.png" alt="Otomatiks Logo" class="logo-img">
      </div>
    </div>

    <div class="card" style="margin-top:32px">
      <h1 style="text-align:center;margin-bottom:24px">Login</h1>

      <!-- Bubble Toggle Switch -->
      <div class="login-toggle-wrapper">
        <div class="login-toggle" id="loginToggle">
          <div class="toggle-bubble" id="toggleBubble"></div>
          <span class="toggle-option" data-mode="parent">Parent</span>
          <span class="toggle-option" data-mode="staff">Staff</span>
        </div>
      </div>

      <!-- <div id="loginHint" class="login-hint">
        <p class="muted" style="text-align:center;margin:16px 0">
          <span id="hintText">Parent Login: Use student name as username (e.g., Ahmed / 0501234567)</span>
        </p>
      </div> -->
      <hr>

      <div class="field">
        <label>User Name</label>
        <input id="email" placeholder="User Name">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="Password">
      </div>

      <div style="text-align:right;margin-top:8px">
        <a href="#" class="forgot-link" onclick="showForgotPassword(); return false;">Forgot username or password?</a>
      </div>

      <div class="actions" style="margin-top:20px">
        <button class="btn" style="width:100%" onclick="doLogin()">Login</button>
      </div>

      <div id="msg" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotModal" class="modal">
    <div class="modal-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="margin:0">Recover Account</h2>
        <button class="btn ghost" onclick="closeForgotPassword()"
          style="padding:4px 8px;font-size:20px">&times;</button>
      </div>

      <div class="forgot-tabs">
        <button class="forgot-tab active" onclick="switchForgotTab('username')">Forgot Username</button>
        <button class="forgot-tab" onclick="switchForgotTab('password')">Forgot Password</button>
      </div>

      <div id="forgotUsernameForm" class="forgot-form">
        <p class="muted">Enter your registered email to recover your username:</p>
        <div class="field">
          <label>Email</label>
          <input id="recoverEmail" type="email" placeholder="Enter your email">
        </div>
        <div class="actions" style="margin-top:16px">
          <button class="btn" onclick="recoverUsername()">Recover Username</button>
        </div>
        <div id="usernameResult" style="margin-top:12px"></div>
      </div>

      <div id="forgotPasswordForm" class="forgot-form" style="display:none">
        <p class="muted">Enter your username/email to reset your password:</p>
        <div class="field">
          <label>Username / Email</label>
          <input id="resetEmail" type="text" placeholder="Enter username or email">
        </div>
        <div class="actions" style="margin-top:16px">
          <button class="btn" onclick="resetPassword()">Reset Password</button>
        </div>
        <div id="passwordResult" style="margin-top:12px"></div>
      </div>
    </div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>
    // Bubble toggle functionality
    let currentMode = 'parent';
    const toggle = document.getElementById('loginToggle');
    const bubble = document.getElementById('toggleBubble');
    const hintText = document.getElementById('hintText');
    const emailInput = document.getElementById('email');

    toggle.addEventListener('click', (e) => {
      const option = e.target.closest('.toggle-option');
      if (!option) return;

      const mode = option.dataset.mode;
      if (mode === currentMode) return;

      currentMode = mode;
      updateToggle();
    });

    function updateToggle() {
      const isParent = currentMode === 'parent';
      bubble.style.transform = isParent ? 'translateX(0)' : 'translateX(100%)';

      // Update hint text
      if (isParent) {
        hintText.textContent = 'Parent Login: Use student name as username (e.g., Ahmed / 0501234567)';
        emailInput.placeholder = 'Student name';
      } else {
        hintText.textContent = 'Staff/Admin Login: Use admin / Oto@2026';
        emailInput.placeholder = 'admin';
      }

      // Update active state
      document.querySelectorAll('.toggle-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.mode === currentMode);
      });
    }

    // Reset Database function
    function resetDatabase() {
      if (confirm('This will clear all data and reset to demo data with new admin credentials. Continue?')) {
        localStorage.removeItem('inst_db_v1');
        localStorage.removeItem('inst_auth');
        alert('Database reset! You can now login with:\n\nAdmin: admin / Oto@2026\nParent: Ahmed / 0501234567');
        location.reload();
      }
    }

    // Initialize
    updateToggle();

    // Add Enter key support for login
    document.getElementById('email').addEventListener('keypress', function (event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        doLogin();
      }
    });

    document.getElementById('password').addEventListener('keypress', function (event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        doLogin();
      }
    });

    // Forgot Password functionality
    function showForgotPassword() {
      document.getElementById('forgotModal').style.display = 'flex';
      switchForgotTab('username');
    }

    function closeForgotPassword() {
      document.getElementById('forgotModal').style.display = 'none';
      document.getElementById('recoverEmail').value = '';
      document.getElementById('resetEmail').value = '';
      document.getElementById('usernameResult').innerHTML = '';
      document.getElementById('passwordResult').innerHTML = '';
    }

    function switchForgotTab(tab) {
      const usernameForm = document.getElementById('forgotUsernameForm');
      const passwordForm = document.getElementById('forgotPasswordForm');
      const tabs = document.querySelectorAll('.forgot-tab');

      tabs.forEach(t => t.classList.remove('active'));

      if (tab === 'username') {
        usernameForm.style.display = 'block';
        passwordForm.style.display = 'none';
        tabs[0].classList.add('active');
      } else {
        usernameForm.style.display = 'none';
        passwordForm.style.display = 'block';
        tabs[1].classList.add('active');
      }
    }

    function recoverUsername() {
      const email = document.getElementById('recoverEmail').value.trim().toLowerCase();
      const resultDiv = document.getElementById('usernameResult');

      if (!email) {
        resultDiv.innerHTML = '<div class="error">Please enter your email address</div>';
        return;
      }

      // Check demo users
      const db = loadDB();
      const user = db.users.find(u => u.email.toLowerCase() === email);

      if (user) {
        resultDiv.innerHTML = `<div class="notice">
        <strong>Username found!</strong><br>
        Your username/email is: <strong>${user.email}</strong><br>
        <small style="margin-top:8px;display:block">You can now use this to login.</small>
      </div>`;
      } else {
        resultDiv.innerHTML = `<div class="error">
        No account found with this email address.<br>
        <small style="margin-top:8px;display:block">Demo accounts: parent@demo.com, staff@demo.com, admin@demo.com, trainer@demo.com</small>
      </div>`;
      }
    }

    function resetPassword() {
      const email = document.getElementById('resetEmail').value.trim().toLowerCase();
      const resultDiv = document.getElementById('passwordResult');

      if (!email) {
        resultDiv.innerHTML = '<div class="error">Please enter your username or email</div>';
        return;
      }

      // Check demo users
      const db = loadDB();
      const user = db.users.find(u => u.email.toLowerCase() === email);

      if (user) {
        resultDiv.innerHTML = `<div class="notice">
        <strong>Password reset instructions sent!</strong><br>
        For demo purposes, your password is: <strong>123456</strong><br>
        <small style="margin-top:8px;display:block">In production, a reset link would be sent to your email.</small>
      </div>`;
      } else {
        resultDiv.innerHTML = `<div class="error">
        No account found with this username/email.<br>
        <small style="margin-top:8px;display:block">Demo accounts: parent@demo.com, staff@demo.com, admin@demo.com, trainer@demo.com</small>
      </div>`;
      }
    }

    // Close modal when clicking outside
    window.onclick = function (event) {
      const modal = document.getElementById('forgotModal');
      if (event.target === modal) {
        closeForgotPassword();
      }
    }
  </script>
</body>

</html>
